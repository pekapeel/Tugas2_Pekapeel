{% load i18n %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login &mdash; Biodata Kelompok</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#1a1209; --card:rgba(255,255,255,0.07); --border:rgba(255,255,255,0.13); --text:#f0ede6; --muted:rgba(240,237,230,0.5); --accent:#e8c47a; }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{min-height:100vh;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);display:flex;align-items:center;justify-content:center;padding:24px}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 60% at 15% 15%,rgba(232,196,122,0.11) 0%,transparent 60%),radial-gradient(ellipse 60% 70% at 85% 85%,rgba(196,122,110,0.09) 0%,transparent 55%);pointer-events:none}
        .card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);border-radius:22px;padding:52px 44px;max-width:420px;width:100%;backdrop-filter:blur(16px);text-align:center;animation:fadeUp 0.7s ease both}
        .brand{font-family:'DM Serif Display',serif;font-size:0.8rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin-bottom:36px;opacity:0.85}
        .icon-wrap{width:64px;height:64px;border-radius:50%;background:rgba(232,196,122,0.12);border:1px solid rgba(232,196,122,0.25);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:1.6rem}
        h1{font-family:'DM Serif Display',serif;font-size:2rem;line-height:1.15;margin-bottom:10px}
        h1 em{font-style:italic;color:var(--accent)}
        .desc{font-size:0.85rem;color:var(--muted);line-height:1.65;margin-bottom:36px}
        .divider{display:flex;align-items:center;gap:12px;margin-bottom:28px}
        .divider-line{flex:1;height:1px;background:var(--border)}
        .divider-text{font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}
        .btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px 24px;background:var(--accent);color:#1a1209;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:600;letter-spacing:0.05em;border:none;border-radius:12px;cursor:pointer;transition:all 0.25s;text-transform:uppercase;text-decoration:none}
        .btn:hover{opacity:0.88;transform:translateY(-2px);box-shadow:0 10px 28px rgba(232,196,122,0.2)}
        .back-link{display:inline-block;margin-top:24px;font-size:0.78rem;color:var(--muted);text-decoration:none;transition:color 0.2s}
        .back-link:hover{color:var(--text)}
        @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">Kelompok &middot; Project</div>
        <div class="icon-wrap">🔑</div>
        <h1>Masuk ke<br><em>Kelompok</em></h1>
        <p class="desc">Login untuk mengakses panel anggota kelompok.</p>
        <div class="divider"><div class="divider-line"></div><span class="divider-text">Lanjutkan dengan</span><div class="divider-line"></div></div>
        <a href="{% url 'socialaccount_login' 'google' %}" class="btn">
            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57C21.36 18.09 22.56 15.27 22.56 12.25z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Masuk dengan Google
        </a>
        <br>
        <a href="/" class="back-link">Kembali ke beranda</a>
    </div>
</body>
</html>
